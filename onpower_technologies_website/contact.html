<!DOCTYPE html>

<link rel="stylesheet" href="css/style.css">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">

</head>

<body>

<!-- HEADER -->
<header class="header">
  <div class="logo-box">
    <img src="images/logo.png">
  </div>

  <nav class="nav-center">
    <a href="index.html">Home</a>
    <a href="#">Services</a>
    <a href="#">Products</a>
    <a href="contact.html">Contact</a>
  </nav>
</header>

<!-- HERO -->
<section class="contact-hero">
  <h1>Let’s Work Together</h1>
  <p>Get a quote for your PCB & Electronics project</p>
</section>

<!-- CONTACT SECTION -->
<section class="contact-section">

  <!-- LEFT INFO -->
  <div class="contact-info reveal">
    <h2>Contact Info</h2>

    <p><i class="fas fa-phone"></i> +91 8810503192</p>
	<p><i class="fas fa-phone"></i> +91 8476003531</p>
    <!--<p><i class="fas fa-envelope"></i> support@onpowertech.com</p>-->
    <p><i class="fas fa-location-dot"></i> India</p>

    <a href="https://wa.me/8476003531" target="_blank" class="whatsapp-btn">
      <i class="fab fa-whatsapp"></i> Chat on WhatsApp
    </a>
  </div>

  <!-- RIGHT FORM -->
  <div class="contact-form reveal">

    <h2>Get Quote</h2>

    <div class="form-group">
      <input type="text" id="name" placeholder="Your Name">
    </div>

    <div class="form-group">
      <input type="email" id="email" placeholder="Your Email">
    </div>

    <div class="form-group">
      <textarea id="msg" rows="4" placeholder="Your Requirement"></textarea>
    </div>
	<button class="btn-quote" onclick="sendWhatsApp()">Send Request</button>

  </div>

</section>

<footer class="footer">
  <p>© 2026 OnPower Technologies</p>
</footer>

<script src="js/contact.js"></script>

</body>
</html>
