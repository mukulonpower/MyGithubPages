<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact - Onpower Technologies</title>

<link rel="stylesheet" href="css/style.css">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">

<style>
.hero{
  background: url('images/Contact us for electronics solutions.png') no-repeat center top;
  background-size: cover;
  min-height: 90vh;  /* 🔥 reduced height */

  display:flex;
  align-items:center;
  justify-content:center;
  text-align:center;
  color:white;
  position:relative;
}

.hero::after{
  content:"";
  position:absolute;
  top:0;left:0;
  width:100%;height:100%;
  background:rgba(0,0,0,0.5);
}

.hero-text{
  position: relative;
  z-index: 2;
}

/* Mobile fix */
@media (max-width:768px){
  .hero{
    background-size: contain;
    background-color: black;
    min-height: 40vh;
  }
}
</style>

</head>

<body>

<!-- HEADER -->
<header class="header">
  <div class="logo-box">
    <img src="images/logo.png" alt="Onpower Logo">
    <h2 class="logo">Onpower Technologies</h2>
  </div>

  <nav class="nav-center">
    <a href="index.html">Home</a>
    <a href="services.html">Services</a> <!-- 🔥 fixed filename -->
    <a href="contact.html">Contact</a>
    <a href="about.html">About</a>	
  </nav>
</header>

<!-- HERO (FIXED) -->
<section class="hero">
  <div class="hero-text">
    <h1>Let’s Work Together</h1>
    <p>Get a quote for your PCB & Electronics project</p>
  </div>
</section>

<!-- CONTACT SECTION -->
<section class="contact-section">

  <!-- LEFT INFO -->
  <div class="contact-info">
    <h2>Contact Info</h2>

    <p><i class="fas fa-phone"></i> +91 8810503192</p>
    <p><i class="fas fa-phone"></i> +91 8476003531</p>

    <p>
      <i class="fas fa-envelope"></i> 
      <a href="mailto:contact@onpowertech.com">contact@onpowertech.com</a>
    </p>

    <p><i class="fas fa-location-dot"></i> India</p>

    <a href="https://wa.me/918810503192" target="_blank" class="whatsapp-btn">
      <i class="fab fa-whatsapp"></i> Chat on WhatsApp
    </a>
  </div>

  <!-- RIGHT FORM -->
  <div class="contact-form">

    <h2>Get Quote</h2>

    <div class="form-group">
      <input type="text" id="name" placeholder="Your Name">
    </div>

    <div class="form-group">
      <input type="email" id="email" placeholder="Your Email">
    </div>

    <div class="form-group">
      <textarea id="msg" rows="4" placeholder="Your Requirement"></textarea>
    </div>

    <button class="btn-quote" onclick="sendWhatsApp()">Send Request</button>

  </div>

</section>

<footer class="footer">
  <p>Onpower Technologies</p>
</footer>

<script src="js/contact.js"></script>

</body>
</html>
